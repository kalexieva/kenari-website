name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject HEIC/HEIF files
        run: |
          if find . -type f \( -iname '*.heic' -o -iname '*.heif' \) | grep -q .; then
            echo "Error: HEIC/HEIF files are not supported on our website. They must be converted to JPG files. Run 'npm run convert:heic' to automatically convert the images."
            find . -type f \( -iname '*.heic' -o -iname '*.heif' \)
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint check
        run: npm run lint

      - name: Build site
        run: npm run build
