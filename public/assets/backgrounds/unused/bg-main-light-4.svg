<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="640" viewBox="0 0 1440 640" preserveAspectRatio="none">
    <defs>
        <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="70" />
        </filter>
        <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#39b54a" stop-opacity="1" />
            <stop offset="50%" stop-color="#39b54a" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#39b54a" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="gradLightGreen" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#83d88e" stop-opacity="0.75" />
            <stop offset="50%" stop-color="#83d88e" stop-opacity="1" />
            <stop offset="100%" stop-color="#83d88e" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#d62612" stop-opacity="0" />
            <stop offset="50%" stop-color="#d62612" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#d62612" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="gradRed2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#d62612" stop-opacity="1" />
            <stop offset="50%" stop-color="#d62612" stop-opacity="1" />
            <stop offset="100%" stop-color="#d62612" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="gradLightRed" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f27769" stop-opacity="0" />
            <stop offset="50%" stop-color="#f27769" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#f27769" stop-opacity="1" />
        </linearGradient>
        <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#daa520" stop-opacity="1" />
            <stop offset="50%" stop-color="#daa520" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#daa520" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="30%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
        </linearGradient>
    </defs>
    <rect width="1440" height="640" fill="#ffffff"/>
    <g filter="url(#blur)">
<!--        <rect x="0" y="-700" width="200" height="700" fill="url(#gradBlue)" transform="rotate(90)" />-->
        <rect x="-150" y="-60" width="600" height="350" fill="url(#gradGreen)" transform="rotate(-20)" />
        <rect x="40" y="100" width="400" height="60" fill="url(#gradLightGreen" transform="rotate(-20)" />
        <rect x="-450" y="350" width="1400" height="50" fill="url(#gradRed2)" transform="rotate(-20)" />
        <rect x="-40" y="350" width="1400" height="200" fill="url(#gradLightRed)" transform="rotate(-20)" />
        <rect x="0" y="200" width="1200" height="200" fill="url(#gradRed)" transform="rotate(-20)" />
    </g>
    <rect width="1440" height="640" fill="url(#bottomFade)"/>
</svg>
