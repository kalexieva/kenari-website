<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 640" preserveAspectRatio="none">
    <defs>
        <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#07070b"/>
            <stop offset="1" stop-color="#000000"/>
        </linearGradient>

        <radialGradient id="g1" cx="75%" cy="15%" r="65%">
            <stop offset="0" stop-color="#00d26a" stop-opacity="0.75"/>
            <stop offset="60%" stop-color="#00d26a" stop-opacity="0"/>
        </radialGradient>

        <radialGradient id="g2" cx="40%" cy="25%" r="65%">
            <stop offset="0" stop-color="#ff2a2a" stop-opacity="0.70"/>
            <stop offset="62%" stop-color="#ff2a2a" stop-opacity="0"/>
        </radialGradient>

        <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="30"/>
        </filter>
    </defs>

    <rect width="1440" height="640" fill="url(#base)"/>
    <g filter="url(#blur)">
        <rect width="1440" height="640" fill="url(#g1)"/>
        <rect width="1440" height="640" fill="url(#g2)"/>
    </g>
</svg>